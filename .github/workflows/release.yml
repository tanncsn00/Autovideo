name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `AutoVideo ${context.ref.replace('refs/tags/', '')}`,
              body: `Download the installer for your OS below.\n\n> **Note:** This is a self-contained app. No Python installation required.`,
              draft: true,
              prerelease: false,
            });
            return String(data.id);
          result-encoding: string

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev \
            libgtk-3-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build Python sidecar
        run: python scripts/build-sidecar.py

      - name: Bundle ImageMagick (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install imagemagick --no-progress -y
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/binaries
          Copy-Item "C:\ProgramData\chocolatey\lib\imagemagick\tools\magick.exe" desktop/src-tauri/binaries/magick.exe
          Write-Host "ImageMagick bundled for Windows"

      - name: Bundle ImageMagick (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          brew install imagemagick
          mkdir -p desktop/src-tauri/binaries
          cp $(which magick) desktop/src-tauri/binaries/magick
          echo "ImageMagick bundled for macOS"

      - name: Bundle ImageMagick (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p desktop/src-tauri/binaries
          cp $(which magick || which convert) desktop/src-tauri/binaries/magick
          echo "ImageMagick bundled for Linux"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'AutoVideo ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your OS below.'
          releaseDraft: true
          prerelease: false
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          tauriScript: npm run tauri
